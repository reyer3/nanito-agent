name: build-saas
description: Materialize a SaaS idea into a functional codebase

inputs:
  - idea: string
  - stack: string

steps:
  # Phase 0: Premortem — break hyperfocalization before building
  - agent: predictor
    task: "Premortem analysis for building a SaaS: {{idea}}. Stack: {{stack}}. Identify assumptions, failure modes, blind spots, and kill criteria."
    output: premortem.md

  - agent: architect
    task: "Design the system architecture for: {{idea}}. Stack: {{stack}}. Consider the premortem findings."
    output: spec.md

  - parallel:
    - agent: api-designer
      task: "Design the REST API based on the architecture spec"
      output: api-spec.yaml
    - agent: frontend-builder
      task: "Design the UI/UX based on the architecture spec"
      output: ui-spec.md
      worktree: true

  # Guard check before heavy implementation
  - agent: devops-guard
    task: "Safety check before implementation phase — verify git state, test health, rollback readiness"

  - parallel:
    - agent: implementer
      task: "Build the backend from the API spec"
      worktree: true
    - agent: implementer
      task: "Build the frontend from the UI spec"
      worktree: true

  # Guard check after implementation
  - agent: devops-guard
    task: "Post-implementation safety check — verify tests pass, no config drift, rollback point exists"

  - agent: tester
    task: "Write and run comprehensive tests for backend and frontend"

  - agent: reviewer
    task: "Final code review — security, quality, correctness. Cross-reference against premortem risks."
